<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https://shared.akamai.steamstatic.com;" />
		<link rel="stylesheet" href="style.css" />
		<title>VaporHours</title>
	</head>
	<body>
		<main class="app-container">
			<section class="main-card" aria-label="Painel principal do farm de horas">
				<h1 class="title">VaporHours</h1>
				<label class="label" for="games-grid">Jogos da biblioteca Steam</label>
				<div class="hint-text" id="libraryHint">Carregando jogos...</div>
				<div class="games-grid" id="games-grid" aria-label="Jogos da biblioteca Steam"></div>
				<div class="actions-row">
					<button class="btn-start" id="startBtn">Start</button>
					<div class="status-label">Steam Conectada: <span id="steamStatus">Não</span></div>
				</div>
				<div class="hint-text" id="hint"></div>
				<div class="timer-text">Tempo: <span id="timer">00:00:00</span></div>
			</section>
		</main>

		<script src="renderer.js"></script>
	</body>
</html>
